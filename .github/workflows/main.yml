name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout source code
      # ─────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Authenticate to Google Cloud
      # ─────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # ─────────────────────────────────────────────
      # 3. Setup Google Cloud SDK
      # ─────────────────────────────────────────────
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ─────────────────────────────────────────────
      # 4. Configure Docker authentication for
      #    Artifact Registry (asia-southeast2)
      # ─────────────────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-southeast2-docker.pkg.dev --quiet

      # ─────────────────────────────────────────────
      # 5. Build Docker image (multi-stage: Vite + PHP)
      #    and push to Artifact Registry
      # ─────────────────────────────────────────────
      - name: Build & Push Docker Image
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REPO }}
        run: |
          PROJECT_ID=$(printf '%s' "${GCP_PROJECT_ID}" | tr -d '[:space:]')
          REPO=$(printf '%s' "${ARTIFACT_REPO}" | tr -d '[:space:]')
          IMAGE_NAME="asia-southeast2-docker.pkg.dev/${PROJECT_ID}/${REPO}/pso"
          echo "[debug] IMAGE_NAME=${IMAGE_NAME}"
          docker build --tag "${IMAGE_NAME}:${GITHUB_SHA}" --tag "${IMAGE_NAME}:latest" --file Dockerfile .
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:latest"

      # ─────────────────────────────────────────────
      # 6. Deploy to Cloud Run
      #    – port 8080 (Apache di Dockerfile)
      #    – env vars dari GitHub Secrets
      # ─────────────────────────────────────────────
      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REPO }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          PROJECT_ID=$(printf '%s' "${GCP_PROJECT_ID}" | tr -d '[:space:]')
          REPO=$(printf '%s' "${ARTIFACT_REPO}" | tr -d '[:space:]')
          CLEAN_APP_KEY=$(printf '%s' "${APP_KEY}" | tr -d '\n\r')
          CLEAN_APP_URL=$(printf '%s' "${APP_URL}" | tr -d '[:space:]')
          CLEAN_MONGODB_URI=$(printf '%s' "${MONGODB_URI}" | tr -d '\n\r')
          IMAGE_NAME="asia-southeast2-docker.pkg.dev/${PROJECT_ID}/${REPO}/pso"
          gcloud run deploy pso-conduit-service \
            --image="${IMAGE_NAME}:${GITHUB_SHA}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars "^|^APP_NAME=Conduit|APP_ENV=production|APP_DEBUG=true|APP_KEY=${CLEAN_APP_KEY}|APP_URL=${CLEAN_APP_URL}|LOG_CHANNEL=stderr|LOG_LEVEL=warning|DB_CONNECTION=mongodb|MONGODB_URI=${CLEAN_MONGODB_URI}|MONGODB_DATABASE=conduit|CACHE_DRIVER=file|SESSION_DRIVER=file|QUEUE_CONNECTION=sync|FILESYSTEM_DISK=local"

      # ─────────────────────────────────────────────
      # 7. Print deployed service URL
      # ─────────────────────────────────────────────
      - name: Get Service URL
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud run services describe pso-conduit-service \
            --platform=managed \
            --region="${GCP_REGION}" \
            --format='value(status.url)'
