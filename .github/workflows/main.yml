name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Laravel Pint linting
  # Berjalan di paling awal sebagai tahap pertama pipeline
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Laravel Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-reqs

      - name: Run Pint
        run: ./vendor/bin/pint --test

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Jalankan PHPUnit test
  # Menggunakan Docker container agar environment sama dengan
  # production (tidak ada konflik ext-mongodb di runner).
  # Hanya berjalan jika tahap linting berhasil.
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Run PHPUnit Tests
    needs: lint
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    container:
      image: php:8.2-cli
      options: --user root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install system dependencies & ext-mongodb
        run: |
          apt-get update -qq
          apt-get install -y -qq git unzip libssl-dev pkg-config autoconf gcc make zip
          yes '' | pecl install mongodb-1.21.5
          echo "extension=mongodb.so" > /usr/local/etc/php/conf.d/ext-mongodb.ini
          pecl install pcov
          echo "extension=pcov.so" > /usr/local/etc/php/conf.d/ext-pcov.ini
          php -r "echo 'ext-mongodb: ' . phpversion('mongodb') . PHP_EOL;"

      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer | php
          mv composer.phar /usr/local/bin/composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment for tests
        run: |
          cp .env.example .env
          php artisan key:generate --ansi --force

      - name: Run PHPUnit tests
        env:
          APP_ENV: testing
          DB_CONNECTION: mongodb
          MONGODB_URI: mongodb://mongodb:27017
          MONGODB_DATABASE: conduit
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: php artisan test --without-tty --coverage

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Build Docker image & Push ke Artifact Registry
  # Dipisah dari deploy agar image hanya di-build sekali,
  # kemudian dipakai oleh staging maupun production
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev --quiet

      - name: Build & Push Docker Image
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REPO }}
        run: |
          PROJECT_ID=$(printf '%s' "${GCP_PROJECT_ID}" | tr -d '[:space:]')
          REPO=$(printf '%s' "${ARTIFACT_REPO}" | tr -d '[:space:]')
          IMAGE_NAME="asia-southeast2-docker.pkg.dev/${PROJECT_ID}/${REPO}/pso"
          echo "[debug] IMAGE_NAME=${IMAGE_NAME}"
          docker build --no-cache --tag "${IMAGE_NAME}:${GITHUB_SHA}" --tag "${IMAGE_NAME}:latest" --file Dockerfile .
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:latest"

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Deploy ke Staging
  # Berjalan otomatis setelah build berhasil.
  # Menggunakan environment "staging" — tambahkan di:
  # GitHub → Settings → Environments → staging
  # ─────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Deploy to Cloud Run (Staging)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REPO }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.STAGING_APP_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          PROJECT_ID=$(printf '%s' "${GCP_PROJECT_ID}" | tr -d '[:space:]')
          REPO=$(printf '%s' "${ARTIFACT_REPO}" | tr -d '[:space:]')
          CLEAN_APP_KEY=$(printf '%s' "${APP_KEY}" | tr -d '\n\r')
          CLEAN_APP_URL=$(printf '%s' "${APP_URL}" | tr -d '[:space:]' | sed 's|^http://|https://|')
          CLEAN_MONGODB_URI=$(printf '%s' "${MONGODB_URI}" | tr -d '\n\r')
          IMAGE_NAME="asia-southeast2-docker.pkg.dev/${PROJECT_ID}/${REPO}/pso"
          gcloud run deploy pso-conduit-service-staging \
            --image="${IMAGE_NAME}:${GITHUB_SHA}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=1 \
            --set-env-vars "^|^APP_NAME=Conduit|APP_ENV=staging|APP_DEBUG=true|APP_KEY=${CLEAN_APP_KEY}|APP_URL=${CLEAN_APP_URL}|LOG_CHANNEL=stderr|LOG_LEVEL=debug|DB_CONNECTION=mongodb|MONGODB_URI=${CLEAN_MONGODB_URI}|MONGODB_DATABASE=conduit_staging|CACHE_DRIVER=array|SESSION_DRIVER=cookie|QUEUE_CONNECTION=sync|FILESYSTEM_DISK=local"

      - name: Get Staging Service URL
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud run services describe pso-conduit-service-staging \
            --platform=managed \
            --region="${GCP_REGION}" \
            --format='value(status.url)'

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Smoke test staging
  # Hits key routes after staging deploy — blocks production if any
  # return a non-2xx response
  # ─────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.STAGING_APP_URL }}
        run: |
          BASE_URL="${BASE_URL%/}"
          echo "Smoke-testing ${BASE_URL}"

          check() {
            local label="$1" path="$2" expect="$3" expected_status="${4:-200}"
            local http_code body
            http_code=$(curl -sL --max-time 20 -o /tmp/smoke_body -w "%{http_code}" "${BASE_URL}${path}")
            body=$(cat /tmp/smoke_body)
            if [ "${expected_status}" = "200" ]; then
              if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 400 ]; then
                echo "FAIL [${label}]: HTTP ${http_code} (expected 2xx/3xx)"
                echo "${body}" | head -c 500
                exit 1
              fi
            else
              if [ "${http_code}" -ne "${expected_status}" ]; then
                echo "FAIL [${label}]: HTTP ${http_code} (expected ${expected_status})"
                echo "${body}" | head -c 500
                exit 1
              fi
            fi
            if [ -n "${expect}" ] && ! echo "${body}" | grep -qi "${expect}"; then
              echo "FAIL [${label}]: response did not contain '${expect}' (HTTP ${http_code})"
              echo "${body}" | head -c 500
              exit 1
            fi
            echo "OK   [${label}]: HTTP ${http_code}"
          }

          echo "Waiting for service to be ready..."
          for i in $(seq 1 12); do
            code=$(curl -sL --max-time 15 -o /dev/null -w "%{http_code}" "${BASE_URL}/")
            if [ "${code}" -ge 200 ] && [ "${code}" -lt 400 ]; then
              echo "Service ready (HTTP ${code}) on attempt ${i}"
              break
            fi
            echo "Attempt ${i}: HTTP ${code} — retrying in 10s"
            if [ "${i}" -eq 12 ]; then
              echo "FAIL: service did not become ready within 2 minutes"
              exit 1
            fi
            sleep 10
          done

          check "health"           "/api/health"               "ok"
          check "homepage"         "/"                         "conduit"
          check "global-feed"      "/global-feed"              "conduit"
          check "sign-in"          "/sign-in"                  "sign in"
          check "sign-up"          "/sign-up"              "sign up"
          check "your-feed"        "/your-feed"                "sign in"
          check "settings"         "/settings"                 "sign in"
          check "editor"           "/editor"                   "sign in"
          check "editor-edit"      "/editor/non-existent"      "sign in"
          check "article-detail"   "/articles/non-existent"    ""            404
          check "user-profile"     "/users/non-existent"       ""            404
          check "user-favorites"   "/users/non-existent/favs"  ""            404
          check "tag-feed"         "/tag-feed/non-existent"    ""            404

          echo "All smoke tests passed."

  # ─────────────────────────────────────────────────────────────────
  # JOB 5: Deploy ke Production
  # Berjalan setelah smoke test staging berhasil.
  # Menggunakan environment "production" — bisa ditambahkan
  # required reviewers di GitHub untuk manual approval sebelum
  # deploy ke production berjalan.
  # ─────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test
    environment: production

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Capture previous production revision
        id: prev-revision
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          PREV=$(gcloud run services describe pso-conduit-service \
            --platform=managed \
            --region="${GCP_REGION}" \
            --format='value(status.latestReadyRevisionName)')
          echo "name=$PREV" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run (Production)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REPO }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          PROJECT_ID=$(printf '%s' "${GCP_PROJECT_ID}" | tr -d '[:space:]')
          REPO=$(printf '%s' "${ARTIFACT_REPO}" | tr -d '[:space:]')
          CLEAN_APP_KEY=$(printf '%s' "${APP_KEY}" | tr -d '\n\r')
          CLEAN_APP_URL=$(printf '%s' "${APP_URL}" | tr -d '[:space:]')
          CLEAN_MONGODB_URI=$(printf '%s' "${MONGODB_URI}" | tr -d '\n\r')
          IMAGE_NAME="asia-southeast2-docker.pkg.dev/${PROJECT_ID}/${REPO}/pso"
          gcloud run deploy pso-conduit-service \
            --image="${IMAGE_NAME}:${GITHUB_SHA}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars "^|^APP_NAME=Conduit|APP_ENV=production|APP_DEBUG=false|APP_KEY=${CLEAN_APP_KEY}|APP_URL=${CLEAN_APP_URL}|LOG_CHANNEL=stderr|LOG_LEVEL=error|DB_CONNECTION=mongodb|MONGODB_URI=${CLEAN_MONGODB_URI}|MONGODB_DATABASE=conduit|CACHE_DRIVER=array|SESSION_DRIVER=cookie|QUEUE_CONNECTION=sync|FILESYSTEM_DISK=local"

      - name: Get Production Service URL
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud run services describe pso-conduit-service \
            --platform=managed \
            --region="${GCP_REGION}" \
            --format='value(status.url)'

      - name: Smoke test production
        id: smoke-prod
        env:
          BASE_URL: ${{ secrets.APP_URL }}
        run: |
          BASE_URL="${BASE_URL%/}"
          check() {
            local label="$1" path="$2" expect="$3" expected_status="${4:-200}"
            local http_code body
            http_code=$(curl -sL --max-time 20 -o /tmp/smoke_body -w "%{http_code}" "${BASE_URL}${path}")
            body=$(cat /tmp/smoke_body)
            if [ "${expected_status}" = "200" ]; then
              if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 400 ]; then
                echo "FAIL [${label}]: HTTP ${http_code} (expected 2xx/3xx)"
                echo "${body}" | head -c 500
                exit 1
              fi
            else
              if [ "${http_code}" -ne "${expected_status}" ]; then
                echo "FAIL [${label}]: HTTP ${http_code} (expected ${expected_status})"
                echo "${body}" | head -c 500
                exit 1
              fi
            fi
            if [ -n "${expect}" ] && ! echo "${body}" | grep -qi "${expect}"; then
              echo "FAIL [${label}]: missing '${expect}' (HTTP ${http_code})"
              echo "${body}" | head -c 500
              exit 1
            fi
            echo "OK   [${label}]: HTTP ${http_code}"
          }

          check "health"           "/api/health"               "ok"
          check "homepage"         "/"                         "conduit"
          check "global-feed"      "/global-feed"              "conduit"
          check "sign-in"          "/sign-in"                  "sign in"
          check "sign-up"          "/sign-up"              "sign up"
          check "your-feed"        "/your-feed"                "sign in"
          check "settings"         "/settings"                 "sign in"
          check "editor"           "/editor"                   "sign in"
          check "editor-edit"      "/editor/non-existent"      "sign in"
          check "article-detail"   "/articles/non-existent"    ""            404
          check "user-profile"     "/users/non-existent"       ""            404
          check "user-favorites"   "/users/non-existent/favs"  ""            404
          check "tag-feed"         "/tag-feed/non-existent"    ""            404
          echo "All production smoke tests passed."

      - name: Rollback production if smoke tests failed
        if: failure() && steps.smoke-prod.outcome == 'failure'
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          echo "Smoke tests failed — rolling back to ${{ steps.prev-revision.outputs.name }}"
          gcloud run services update-traffic pso-conduit-service \
            --platform=managed \
            --region="${GCP_REGION}" \
            --to-revisions="${{ steps.prev-revision.outputs.name }}=100"