name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Run tests, Build, Push & Deploy
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout source code
      # ─────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Authenticate to Google Cloud
      # ─────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # ─────────────────────────────────────────────
      # 3. Setup Google Cloud SDK
      # ─────────────────────────────────────────────
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ─────────────────────────────────────────────
      # 4. Configure Docker authentication for
      #    Artifact Registry (asia-southeast2)
      # ─────────────────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-southeast2-docker.pkg.dev --quiet

      # ─────────────────────────────────────────────
      # 5. Setup PHP and install test dependencies
      # ─────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: :mongodb
          coverage: none

      - name: Install ext-mongodb 1.21.3 (downgrade from pre-installed 2.x)
        run: |
          # Hapus semua config mongodb yang mungkin memuat versi 2.x
          sudo rm -f /etc/php/8.2/cli/conf.d/20-mongodb.ini
          sudo rm -f /etc/php/8.2/mods-available/mongodb.ini
          # Install versi 1.21.3 yang kompatibel dengan composer.lock
          sudo pecl install -f mongodb-1.21.3
          # Aktifkan extension baru
          echo "extension=mongodb.so" | sudo tee /etc/php/8.2/cli/conf.d/20-mongodb.ini
          # Verifikasi versi yang terpasang
          php -r "echo 'ext-mongodb version: ' . phpversion('mongodb') . PHP_EOL;"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment for tests
        run: |
          cp .env.example .env
          php artisan key:generate --ansi --force

      - name: Run PHPUnit tests
        env:
          APP_ENV: testing
          DB_CONNECTION: mongodb
          MONGODB_URI: mongodb://127.0.0.1:27017
          MONGODB_DATABASE: conduit
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: php artisan test --no-tty

      # ─────────────────────────────────────────────
      # 6. Build Docker image (multi-stage: Vite + PHP)
      #    and push to Artifact Registry
      # ─────────────────────────────────────────────
      - name: Build & Push Docker Image
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REPO }}
        run: |
          PROJECT_ID=$(printf '%s' "${GCP_PROJECT_ID}" | tr -d '[:space:]')
          REPO=$(printf '%s' "${ARTIFACT_REPO}" | tr -d '[:space:]')
          IMAGE_NAME="asia-southeast2-docker.pkg.dev/${PROJECT_ID}/${REPO}/pso"
          echo "[debug] IMAGE_NAME=${IMAGE_NAME}"
          docker build --tag "${IMAGE_NAME}:${GITHUB_SHA}" --tag "${IMAGE_NAME}:latest" --file Dockerfile .
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:latest"

      # ─────────────────────────────────────────────
      # 7. Deploy to Cloud Run
      #    – port 8080 (Apache di Dockerfile)
      #    – env vars dari GitHub Secrets
      # ─────────────────────────────────────────────
      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REPO }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          PROJECT_ID=$(printf '%s' "${GCP_PROJECT_ID}" | tr -d '[:space:]')
          REPO=$(printf '%s' "${ARTIFACT_REPO}" | tr -d '[:space:]')
          CLEAN_APP_KEY=$(printf '%s' "${APP_KEY}" | tr -d '\n\r')
          CLEAN_APP_URL=$(printf '%s' "${APP_URL}" | tr -d '[:space:]')
          CLEAN_MONGODB_URI=$(printf '%s' "${MONGODB_URI}" | tr -d '\n\r')
          IMAGE_NAME="asia-southeast2-docker.pkg.dev/${PROJECT_ID}/${REPO}/pso"
          gcloud run deploy pso-conduit-service \
            --image="${IMAGE_NAME}:${GITHUB_SHA}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars "^|^APP_NAME=Conduit|APP_ENV=production|APP_DEBUG=false|APP_KEY=${CLEAN_APP_KEY}|APP_URL=${CLEAN_APP_URL}|LOG_CHANNEL=stderr|LOG_LEVEL=debug|DB_CONNECTION=mongodb|MONGODB_URI=${CLEAN_MONGODB_URI}|MONGODB_DATABASE=conduit|CACHE_DRIVER=array|SESSION_DRIVER=cookie|QUEUE_CONNECTION=sync|FILESYSTEM_DISK=local"

      # ─────────────────────────────────────────────
      # 8. Print deployed service URL
      # ─────────────────────────────────────────────
      - name: Get Service URL
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud run services describe pso-conduit-service \
            --platform=managed \
            --region="${GCP_REGION}" \
            --format='value(status.url)'
